<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>캠페인 구조도</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { overflow-x: auto; overflow-y: auto; }
  body {
    font-family:'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;
    background:#f8f9fa;
    padding:20px 16px 32px;
    color:#333;
  }
  h2 {
    font-size:18px; font-weight:700; color:#1e4a72;
    margin-bottom:6px; padding-bottom:8px; border-bottom:2px solid #1e4a72;
  }
  #diagram { position:relative; margin-top:8px; }
  .hdr {
    position:absolute; top:8px;
    font-size:10px; font-weight:700; color:#fff;
    background:#0d2244; text-align:center;
    padding:5px 4px; border-radius:3px; line-height:1.25;
    white-space:pre-line;
  }
  /* 적용 조건 1~3 열 헤더 = 본문(cond-apply)과 동일 파랑 */
  .hdr.hdr-cond {
    background:#1565c0;
    border:1px solid #0d47a1;
  }
  .nd {
    position:absolute;
    display:flex; align-items:center; justify-content:center;
    text-align:center; border-radius:3px;
    font-size:11px; line-height:1.25; padding:2px 4px;
    color:#fff; font-weight:600;
  }
  .nd-cond { font-size:9.5px; line-height:1.2; padding:2px 3px; }
  /* 적용 조건 1~3 동일 톤 */
  .cond-apply { background:#1565c0 !important; border:1px solid #0d47a1 !important; color:#fff !important; }
  .c0 { background:#1a3a6b; border:1px solid #0d2244; }
  .c1 { background:#1e4b8a; border:1px solid #1a3a6b; }
  .c2 { background:#2e5fa3; border:1px solid #1e4b8a; }
  .c3 { background:#3668b5; border:1px solid #2e5fa3; }
  .c4 { background:#4a7cc7; border:1px solid #3668b5; }
  .c5 { background:#5a8fd4; border:1px solid #4a7cc7; }
  .c6 { background:#6ba3e0; border:1px solid #5a8fd4; }
  .mtd-promo  { background:#2e7d32; border:1px solid #1b5e20; }
  .mtd-mission { background:#0d47a1; border:1px solid #082c5a; }
  .mtd-reward  { background:#6a1b9a; border:1px solid #4a148c; }
  svg { position:absolute; top:0; left:0; pointer-events:none; overflow:visible; }
</style>
</head>
<body>
<h2>캠페인 구조도</h2>
<div id="diagram">
<svg id="svg"></svg>
</div>
<script>
const D = document.getElementById('diagram');
const SVG = document.getElementById('svg');
const NH = 32;
const RP = 56;
const DT = 52;

function rc(r) { return DT + r*RP + RP/2; }
function gc(s,e) { return (rc(s)+rc(e))/2; }

const C = {
  cam:  { lbl:'캠페인',           x:8,   w:64  },
  typ:  { lbl:'구분',             x:76,  w:68  },
  rwt:  { lbl:'대분류',           x:148, w:56  },
  tgt:  { lbl:'적용 대상',        x:208, w:60  },
  ttp:  { lbl:'적용대상 유형',    x:272, w:100 },
  tst:  { lbl:'적용대상\n세부유형', x:376, w:104 },
  mtd:  { lbl:'소분류',           x:484, w:82  },
  pyt:  { lbl:'지급 방식',        x:570, w:56  },
  pm1:  { lbl:'적용 조건 1',      x:630, w:72  },
  pm2:  { lbl:'적용 조건 2',      x:706, w:72  },
  pm3:  { lbl:'적용 조건 3',      x:782, w:72  },
};

const G = {
  cam: [{ v:'캠페인', s:0, e:11 }],
  typ: [
    { v:'프로모션', s:0, e:2 },
    { v:'미션',     s:3, e:6 },
    { v:'리워드',   s:7, e:11 },
  ],
  rwt: [
    { v:'할인',   s:0, e:0 },
    { v:'쿠폰',   s:1, e:1 },
    { v:'지급',   s:2, e:6 },
    { v:'보너스', s:7, e:11 },
  ],
  tgt: [
    { v:'상점',   s:0, e:1 },
    { v:'라이더', s:2, e:11 },
  ],
  ttp: [
    { v:'전체·직영·\n프렌즈·세트', s:2, e:6 },
    { v:'전체·직영·\n프렌즈·세트', s:7, e:11 },
  ],
  tst: [
    { v:'-', s:0, e:1 },
    { v:'프렌즈: 풀타임/파트타임', s:2, e:2 },
    { v:'프렌즈: 풀타임/파트타임', s:3, e:3 },
    { v:'프렌즈: 풀타임/파트타임', s:4, e:4 },
    { v:'프렌즈: 풀타임/파트타임', s:5, e:5 },
    { v:'프렌즈: 풀타임/파트타임', s:6, e:6 },
    { v:'프렌즈: 풀타임/파트타임', s:7, e:11 },
  ],
  mtd: [
    { v:'상점 일반',       s:0,  e:0, cls:'mtd-promo' },
    { v:'제로패스',        s:1,  e:1, cls:'mtd-promo' },
    { v:'라이더 프로모션', s:2,  e:2, cls:'mtd-promo' },
    { v:'단계형',          s:3,  e:3, cls:'mtd-mission' },
    { v:'단일 목표형',     s:4,  e:4, cls:'mtd-mission' },
    { v:'복귀',            s:5,  e:5, cls:'mtd-mission' },
    { v:'첫배달',          s:6,  e:6, cls:'mtd-mission' },
    { v:'등급별\n(그린~골드2)', s:7, e:11, cls:'mtd-reward' },
  ],
  pyt: [
    { v:'정액', s:0, e:0 },
    { v:'횟수', s:1, e:1 },
    { v:'정액/정률', s:2, e:6 },
    { v:'정률', s:7, e:11 },
  ],
  pm1: [
    { v:'지역/ZONE 선택', s:0, e:0 },
    { v:'지역/ZONE 선택', s:1, e:1 },
    { v:'지역/ZONE 선택', s:2, e:2 },
    { v:'시간대 설정', s:3, e:3 },
    { v:'날짜 지정', s:4, e:4 },
    { v:'비활성 기간 조건', s:5, e:5 },
    { v:'가입 후\n기간 설정', s:6, e:6 },
    { v:'직전 2주 배달\n누적 건수', s:7, e:11 },
  ],
  pm2: [
    { v:'특정 상점 선택', s:0, e:0 },
    { v:'특정 상점 선택', s:1, e:1 },
    { v:'특정 라이더 선택', s:2, e:2 },
    { v:'특정 건수 단계\n설정', s:3, e:3 },
    { v:'목표 건수', s:4, e:4 },
    { v:'복귀 후 목표 건수', s:5, e:5 },
    { v:'수행건수', s:6, e:6 },
    { v:'배차 수락률 기준', s:7, e:11 },
  ],
  pm3: [
    { v:'적용 기간', s:0, e:0 },
    { v:'횟수 설정\n(최대 5회)', s:1, e:1 },
    { v:'적용 기간', s:2, e:2 },
    { v:'-', s:3, e:3 },
    { v:'-', s:4, e:4 },
    { v:'-', s:5, e:5 },
    { v:'-', s:6, e:6 },
    { v:'매주 배달\n최소 건수', s:7, e:11 },
  ],
};

const CLS = ['c0','c1','c2','c3','c4','c4','c5','c5','c5','c5','c6'];
const KEYS = ['cam','typ','rwt','tgt','ttp','tst','mtd','pyt','pm1','pm2','pm3'];

function fgs(key, s) { return G[key] ? G[key].find(g => g.s === s) : null; }
function fgr(key, r) { return G[key] ? G[key].find(g => g.s <= r && r <= g.e) : null; }

KEYS.forEach((k) => {
  const col = C[k];
  const el = document.createElement('div');
  el.className = 'hdr' + (k === 'pm1' || k === 'pm2' || k === 'pm3' ? ' hdr-cond' : '');
  el.style.cssText = `left:${col.x}px; width:${col.w}px;`;
  if (/\n/.test(col.lbl)) el.style.whiteSpace = 'pre-line';
  el.textContent = col.lbl;
  D.appendChild(el);
});

KEYS.forEach((key, ki) => {
  const col = C[key];
  G[key].forEach(grp => {
    if (!grp.v) return;
    const cy = gc(grp.s, grp.e);
    const el = document.createElement('div');
    const condCol = key === 'pm1' || key === 'pm2' || key === 'pm3';
    const smallMultiline = key === 'tst';
    let cellCls = grp.cls || CLS[ki];
    if (key === 'pm1' || key === 'pm2' || key === 'pm3') cellCls = 'cond-apply';
    el.className = 'nd ' + (condCol || smallMultiline ? 'nd-cond ' : '') + cellCls;
    el.style.cssText = `left:${col.x}px; top:${cy-NH/2}px; width:${col.w}px; height:${NH}px;`;
    if (/\n/.test(grp.v)) el.style.whiteSpace = 'pre-line';
    el.textContent = grp.v;
    D.appendChild(el);
  });
});

function line(x1,y1,x2,y2) {
  const t = 0.52;
  const mx = x1 + (x2 - x1) * t;
  const p = document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d',`M${x1},${y1} L${mx},${y1} L${mx},${y2} L${x2},${y2}`);
  p.setAttribute('fill','none');
  p.setAttribute('stroke','#5b7fc4');
  p.setAttribute('stroke-width','1.1');
  p.setAttribute('stroke-linecap','round');
  p.setAttribute('stroke-linejoin','round');
  p.setAttribute('opacity','0.92');
  SVG.appendChild(p);
}

/* 프로모션(구분) → 라이더 프로모션(소분류) ㄴ자 직선 연결 (설명/라벨 없이 선만) */
function promoLink() {
  const x1 = C.typ.x + C.typ.w;
  const y1 = rc(2);         // '프로모션' 박스(0~2행) 중 라이더프로모션 행 높이에서 출발 (쿠폰 행 관통 방지)
  const x2 = C.mtd.x;
  const y2 = rc(2);         // '라이더 프로모션' 행 중심
  const mx = x1 + 26;       // ㄴ 꺾임을 typ 바로 옆에 두기
  const p = document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d', `M${x1},${y1} L${mx},${y1} L${mx},${y2} L${x2},${y2}`);
  p.setAttribute('fill', 'none');
  p.setAttribute('stroke', '#2e7d32');
  p.setAttribute('stroke-width', '2.2');
  p.setAttribute('stroke-linecap', 'round');
  p.setAttribute('stroke-linejoin', 'round');
  p.setAttribute('opacity', '0.96');
  SVG.appendChild(p);
}

function connG(fkey, fs, tkey, ts) {
  const fg = fgs(fkey, fs);
  const tg = fgs(tkey, ts);
  if (!fg || !tg) return;
  const fc = C[fkey], tc = C[tkey];
  line(fc.x+fc.w, gc(fg.s,fg.e), tc.x, gc(tg.s,tg.e));
}

connG('cam',0,'typ',0); connG('cam',0,'typ',3); connG('cam',0,'typ',7);
connG('typ',0,'rwt',0); connG('typ',0,'rwt',1); connG('typ',0,'rwt',2);
connG('typ',3,'rwt',2);
connG('typ',7,'rwt',7);
connG('rwt',0,'tgt',0); connG('rwt',1,'tgt',0);
connG('rwt',2,'tgt',2);
connG('rwt',7,'tgt',2);
connG('tgt',0,'tst',0);
connG('tst',0,'mtd',0); connG('tst',0,'mtd',1);
connG('tgt',2,'ttp',2); connG('tgt',2,'ttp',7);
connG('ttp',2,'tst',2); connG('tst',2,'mtd',2);
connG('ttp',2,'tst',3); connG('tst',3,'mtd',3);
connG('ttp',2,'tst',4); connG('tst',4,'mtd',4);
connG('ttp',2,'tst',5); connG('tst',5,'mtd',5);
connG('ttp',2,'tst',6); connG('tst',6,'mtd',6);
connG('ttp',7,'tst',7); connG('tst',7,'mtd',7);

function connectTail(mtdStart) {
  const m = fgs('mtd', mtdStart);
  const py = fgr('pyt', mtdStart);
  const a = fgs('pm1', mtdStart);
  const b = fgs('pm2', mtdStart);
  const c = fgs('pm3', mtdStart);
  if (!m || !py || !a || !b || !c) return;
  line(C.mtd.x + C.mtd.w, gc(m.s, m.e), C.pyt.x, gc(py.s, py.e));
  line(C.pyt.x + C.pyt.w, gc(py.s, py.e), C.pm1.x, gc(a.s, a.e));
  line(C.pm1.x + C.pm1.w, gc(a.s, a.e), C.pm2.x, gc(b.s, b.e));
  line(C.pm2.x + C.pm2.w, gc(b.s, b.e), C.pm3.x, gc(c.s, c.e));
}
[0, 1, 2, 3, 4, 5, 6, 7].forEach(connectTail);

promoLink();

const totalH = DT + 12*RP + 44;
const totalW = C.pm3.x + C.pm3.w + 28;
D.style.cssText = `width:${totalW}px; min-height:${totalH}px; height:${totalH}px;`;
SVG.setAttribute('width', totalW);
SVG.setAttribute('height', totalH);
document.body.style.minWidth = (totalW + 32) + 'px';
</script>
</body>
</html>
