<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>캠페인 구조도</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { overflow: hidden; }
  body { font-family:'Malgun Gothic','맑은 고딕',sans-serif; background:#fff; padding:32px; }
  h2 { font-size:18px; font-weight:700; color:#1a1a2e; margin-bottom:20px; padding-bottom:8px; border-bottom:2px solid #1a3a6b; }
  #diagram { position:relative; }
  .hdr {
    position:absolute; top:8px;
    font-size:11px; font-weight:700; color:#fff;
    background:#0d2244; text-align:center;
    padding:5px 4px; border-radius:3px; line-height:1.3;
    white-space:pre-line;
  }
  .nd {
    position:absolute;
    display:flex; align-items:center; justify-content:center;
    text-align:center; border-radius:3px;
    font-size:11px; line-height:1.25; padding:2px 4px;
    color:#fff; font-weight:600;
  }
  .nd-cond { font-size:9.5px; line-height:1.2; padding:2px 3px; }
  .c0 { background:#1a3a6b; border:1px solid #0d2244; }
  .c1 { background:#1e4b8a; border:1px solid #1a3a6b; }
  .c2 { background:#2e5fa3; border:1px solid #1e4b8a; }
  .c3 { background:#3668b5; border:1px solid #2e5fa3; }
  .c4 { background:#4a7cc7; border:1px solid #3668b5; }
  .c5 { background:#5a8fd4; border:1px solid #4a7cc7; }
  .c6 { background:#6ba3e0; border:1px solid #5a8fd4; }
  .pre  { background:#2e7d32; border:1px solid #1b5e20; }
  .post { background:#1565c0; border:1px solid #0d47a1; }
  /* Method(소분류): 프로모션 / 미션 / 리워드 시각 구분 */
  .mtd-promo  { background:#2e7d32; border:1px solid #1b5e20; }
  .mtd-mission { background:#0d47a1; border:1px solid #082c5a; }
  .mtd-reward  { background:#6a1b9a; border:1px solid #4a148c; }
  svg { position:absolute; top:0; left:0; pointer-events:none; overflow:visible; }
</style>
</head>
<body>
<div id="diagram">
<svg id="svg"></svg>
</div>
<script>
const D = document.getElementById('diagram');
const SVG = document.getElementById('svg');
const NH = 32;   // node height
const RP = 56;   // row pitch
const DT = 52;   // data top

function rc(r) { return DT + r*RP + RP/2; }
function gc(s,e) { return (rc(s)+rc(e))/2; }

// 컬럼 정의 — 왼→오른 = 데이터 흐름 · 적용 조건은 캠페인 유형 통합표와 동일 문구(행별)
const C = {
  cam: { lbl:'Campaign',              x:10,  w:78  },
  typ: { lbl:'Campaign Type',         x:96,  w:86  },
  tgt: { lbl:'Target',               x:190, w:68  },
  ttp: { lbl:'Target Type\n(적용대상 유형)', x:266, w:88 },
  rwt: { lbl:'Reward Type',          x:362, w:68  },
  mtd: { lbl:'Method\n(소분류)',      x:436, w:92  },
  pm1: { lbl:'Condition 1\n(적용 조건 1)', x:534, w:84 },
  pm2: { lbl:'Condition 2\n(적용 조건 2)', x:624, w:84 },
  pm3: { lbl:'Condition 3\n(적용 조건 3)', x:714, w:84 },
  pyt: { lbl:'Payout Method\n(지급 방식)', x:804, w:70  },
};

// 그룹 데이터
const G = {
  cam: [{v:'캠페인', s:0, e:10}],
  typ: [
    {v:'프로모션', s:0, e:2},
    {v:'미션',     s:3, e:5},
    {v:'리워드',   s:6, e:10},
  ],
  tgt: [
    {v:'상점',   s:0, e:1},
    {v:'라이더', s:2, e:10},
  ],
  ttp: [
    {v:'전체·직영·프렌즈·지점', s:2, e:5},
    {v:'전체·직영·프렌즈·지점', s:6, e:10},
  ],
  rwt: [
    {v:'할인',   s:0, e:0},
    {v:'쿠폰',   s:1, e:1},
    {v:'지급',   s:2, e:5},
    {v:'보너스', s:6, e:10},
  ],
  mtd: [
    {v:'상점 일반',       s:0,  e:0, cls:'mtd-promo'},
    {v:'제로패스',        s:1,  e:1, cls:'mtd-promo'},
    {v:'라이더 프로모션', s:2,  e:2, cls:'mtd-promo'},
    {v:'단계형',          s:3,  e:3, cls:'mtd-mission'},
    {v:'단일 목표형',     s:4,  e:4, cls:'mtd-mission'},
    {v:'복귀',            s:5,  e:5, cls:'mtd-mission'},
    {v:'등급별',           s:6,  e:10, cls:'mtd-reward'},
  ],
  /* 통합표 적용 조건 1~3 — 소분류(mtd) 행(s)과 1:1 */
  pm1: [
    {v:'지역/ZONE 선택', s:0, e:0},
    {v:'지역/ZONE 선택', s:1, e:1},
    {v:'지역/ZONE 선택', s:2, e:2},
    {v:'시간대 설정', s:3, e:3},
    {v:'날짜 지정', s:4, e:4},
    {v:'비활성 기간 조건', s:5, e:5},
    {v:'직전 2주 배달\n누적 건수', s:6, e:10},
  ],
  pm2: [
    {v:'특정 상점 선택', s:0, e:0},
    {v:'특정 상점 선택', s:1, e:1},
    {v:'특정 라이더 선택', s:2, e:2},
    {v:'특정 건수 단계\n설정', s:3, e:3},
    {v:'목표 건수', s:4, e:4},
    {v:'복귀 후 목표 건수', s:5, e:5},
    {v:'배차 수락률 기준', s:6, e:10},
  ],
  pm3: [
    {v:'적용 기간', s:0, e:0},
    {v:'횟수 설정\n(최대 5회)', s:1, e:1},
    {v:'적용 기간', s:2, e:2},
    {v:'등급 선택', s:3, e:3},
    {v:'등급 선택', s:4, e:4},
    {v:'등급 선택', s:5, e:5},
    {v:'매주 배달\n최소 건수', s:6, e:10},
  ],
  pyt: [
    {v:'정액',     s:0, e:2},
    {v:'정액',     s:3, e:5},
    {v:'정률 (%)', s:6, e:10},
  ],
};

const CLS = ['c0','c1','c2','c2','c3','c4','c5','c5','c5','c6'];
const KEYS = ['cam','typ','tgt','ttp','rwt','mtd','pm1','pm2','pm3','pyt'];

function fgs(key, s) { return G[key] ? G[key].find(g => g.s === s) : null; }
function fgr(key, r) { return G[key] ? G[key].find(g => g.s <= r && r <= g.e) : null; }

// 헤더 (표시 순서 고정)
KEYS.forEach((k) => {
  const col = C[k];
  const el = document.createElement('div');
  el.className = 'hdr';
  el.style.cssText = `left:${col.x}px; width:${col.w}px;`;
  el.textContent = col.lbl;
  D.appendChild(el);
});

// 노드
KEYS.forEach((key, ki) => {
  const col = C[key];
  G[key].forEach(grp => {
    if (!grp.v) return;
    const cy = gc(grp.s, grp.e);
    const el = document.createElement('div');
    const condCol = key === 'pm1' || key === 'pm2' || key === 'pm3';
    el.className = 'nd ' + (condCol ? 'nd-cond ' : '') + (grp.cls || CLS[ki]);
    el.style.cssText = `left:${col.x}px; top:${cy-NH/2}px; width:${col.w}px; height:${NH}px;`;
    if (/\n/.test(grp.v)) el.style.whiteSpace = 'pre-line';
    el.textContent = grp.v;
    D.appendChild(el);
  });
});

// 연결선 (오른쪽으로만 진행하는 열 배치 가정, 팔꿈치는 중간에서 직각)
function line(x1,y1,x2,y2) {
  const mx = x1 + (x2 - x1) * 0.5;
  const p = document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d',`M${x1},${y1} L${mx},${y1} L${mx},${y2} L${x2},${y2}`);
  p.setAttribute('fill','none');
  p.setAttribute('stroke','#5a85c0');
  p.setAttribute('stroke-width','1.15');
  p.setAttribute('stroke-linecap','round');
  p.setAttribute('stroke-linejoin','round');
  SVG.appendChild(p);
}

function connG(fkey, fs, tkey, ts) {
  const fg = fgs(fkey, fs);
  const tg = fgs(tkey, ts);
  if (!fg || !tg) return;
  const fc = C[fkey], tc = C[tkey];
  line(fc.x+fc.w, gc(fg.s,fg.e), tc.x, gc(tg.s,tg.e));
}

// cam → typ
connG('cam',0,'typ',0); connG('cam',0,'typ',3); connG('cam',0,'typ',6);

// typ → tgt
connG('typ',0,'tgt',0); connG('typ',0,'tgt',2); connG('typ',3,'tgt',2); connG('typ',6,'tgt',2);

// tgt → rwt (상점만 직결)
connG('tgt',0,'rwt',0); connG('tgt',0,'rwt',1);

// tgt → 적용대상 유형 (라이더) — 프로모션·미션 구간 / 리워드 구간
connG('tgt',2,'ttp',2);
connG('tgt',2,'ttp',6);

// 적용대상 유형 → Reward Type (지급 / 보너스)
connG('ttp',2,'rwt',2);
connG('ttp',6,'rwt',6);

// rwt → mtd
connG('rwt',0,'mtd',0); connG('rwt',1,'mtd',1); connG('rwt',2,'mtd',2);
connG('rwt',2,'mtd',3); connG('rwt',2,'mtd',4); connG('rwt',2,'mtd',5);
connG('rwt',6,'mtd',6);

// mtd → 적용 조건 1→2→3 → 지급 방식 (소분류 행별, 통합표와 동일)
function connectCondChain(mtdStart) {
  const m = fgs('mtd', mtdStart);
  const a = fgs('pm1', mtdStart);
  const b = fgs('pm2', mtdStart);
  const c = fgs('pm3', mtdStart);
  if (!m || !a || !b || !c) return;
  line(C.mtd.x + C.mtd.w, gc(m.s, m.e), C.pm1.x, gc(a.s, a.e));
  line(C.pm1.x + C.pm1.w, gc(a.s, a.e), C.pm2.x, gc(b.s, b.e));
  line(C.pm2.x + C.pm2.w, gc(b.s, b.e), C.pm3.x, gc(c.s, c.e));
  const py = fgr('pyt', mtdStart);
  if (py) line(C.pm3.x + C.pm3.w, gc(c.s, c.e), C.pyt.x, gc(py.s, py.e));
}
[0, 1, 2, 3, 4, 5, 6].forEach(connectCondChain);

const totalH = DT + 11*RP + 30;
const totalW = C.pyt.x + C.pyt.w + 20;
D.style.cssText = `width:${totalW}px; height:${totalH}px;`;
SVG.setAttribute('width', totalW);
SVG.setAttribute('height', totalH);
document.documentElement.style.overflow = 'hidden';
document.body.style.height = (totalH + 64) + 'px';
document.body.style.minHeight = (totalH + 64) + 'px';
document.body.style.maxHeight = (totalH + 64) + 'px';
</script>
</body>
</html>
