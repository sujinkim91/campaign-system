<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>캠페인 구조도</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { overflow-x: auto; overflow-y: auto; }
  body {
    font-family:'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;
    background:#f8f9fa;
    padding:20px 16px 32px;
    color:#333;
  }
  h2 {
    font-size:18px; font-weight:700; color:#1e4a72;
    margin-bottom:6px; padding-bottom:8px; border-bottom:2px solid #1e4a72;
  }
  /* 적용 조건 3 열이 뷰포트에서 잘려 보이도록(연속성·다음 단계 암시) */
  .diagram-frame {
    position: relative;
    margin-top: 8px;
    max-width: 728px;
    overflow: hidden;
    border-radius: 0 0 4px 4px;
  }
  .diagram-frame::after {
    content: '';
    position: absolute;
    top: 0;
    right: 0;
    width: 36px;
    height: 100%;
    min-height: 200px;
    background: linear-gradient(to left, #f8f9fa 0%, rgba(248,249,250,0.92) 35%, transparent 100%);
    pointer-events: none;
  }
  #diagram { position:relative; }
  .hdr {
    position:absolute; top:8px;
    font-size:10px; font-weight:700; color:#fff;
    background:#0d2244; text-align:center;
    padding:5px 4px; border-radius:3px; line-height:1.25;
    white-space:pre-line;
  }
  .nd {
    position:absolute;
    display:flex; align-items:center; justify-content:center;
    text-align:center; border-radius:3px;
    font-size:11px; line-height:1.25; padding:2px 4px;
    color:#fff; font-weight:600;
  }
  .nd-cond { font-size:9.5px; line-height:1.2; padding:2px 3px; }
  .c0 { background:#1a3a6b; border:1px solid #0d2244; }
  .c1 { background:#1e4b8a; border:1px solid #1a3a6b; }
  .c2 { background:#2e5fa3; border:1px solid #1e4b8a; }
  .c3 { background:#3668b5; border:1px solid #2e5fa3; }
  .c4 { background:#4a7cc7; border:1px solid #3668b5; }
  .c5 { background:#5a8fd4; border:1px solid #4a7cc7; }
  .c6 { background:#6ba3e0; border:1px solid #5a8fd4; }
  .mtd-promo  { background:#2e7d32; border:1px solid #1b5e20; }
  .mtd-mission { background:#0d47a1; border:1px solid #082c5a; }
  .mtd-reward  { background:#6a1b9a; border:1px solid #4a148c; }
  svg { position:absolute; top:0; left:0; pointer-events:none; overflow:visible; }
</style>
</head>
<body>
<h2>캠페인 구조도</h2>
<div class="diagram-frame">
<div id="diagram">
<svg id="svg"></svg>
</div>
</div>
<script>
const D = document.getElementById('diagram');
const SVG = document.getElementById('svg');
const NH = 32;
const RP = 56;
const DT = 52;

function rc(r) { return DT + r*RP + RP/2; }
function gc(s,e) { return (rc(s)+rc(e))/2; }

const C = {
  cam:  { lbl:'캠페인',           x:8,   w:64  },
  typ:  { lbl:'구분',             x:76,  w:68  },
  rwt:  { lbl:'대분류',           x:148, w:56  },
  tgt:  { lbl:'적용 대상',        x:208, w:60  },
  ttp:  { lbl:'적용대상 유형',    x:272, w:100 },
  mtd:  { lbl:'소분류',           x:378, w:82  },
  pyt:  { lbl:'지급 방식',        x:464, w:56  },
  pm1:  { lbl:'적용 조건 1',      x:524, w:72  },
  pm2:  { lbl:'적용 조건 2',      x:600, w:72  },
  pm3:  { lbl:'적용 조건 3',      x:676, w:72  },
};

const G = {
  cam: [{ v:'캠페인', s:0, e:10 }],
  typ: [
    { v:'프로모션', s:0, e:2 },
    { v:'미션',     s:3, e:5 },
    { v:'리워드',   s:6, e:10 },
  ],
  rwt: [
    { v:'할인',   s:0, e:0 },
    { v:'쿠폰',   s:1, e:1 },
    { v:'지급',   s:2, e:5 },
    { v:'보너스', s:6, e:10 },
  ],
  tgt: [
    { v:'상점',   s:0, e:1 },
    { v:'라이더', s:2, e:10 },
  ],
  ttp: [
    { v:'전체·직영·\n프렌즈(풀타임·파트타임)\n·지점=세트', s:2, e:5 },
    { v:'전체·직영·\n프렌즈(풀타임·파트타임)\n·지점=세트', s:6, e:10 },
  ],
  mtd: [
    { v:'상점 일반',       s:0,  e:0, cls:'mtd-promo' },
    { v:'제로패스',        s:1,  e:1, cls:'mtd-promo' },
    { v:'라이더 프로모션', s:2,  e:2, cls:'mtd-promo' },
    { v:'단계형',          s:3,  e:3, cls:'mtd-mission' },
    { v:'단일 목표형',     s:4,  e:4, cls:'mtd-mission' },
    { v:'복귀',            s:5,  e:5, cls:'mtd-mission' },
    { v:'등급별\n(그린~골드2)', s:6, e:10, cls:'mtd-reward' },
  ],
  pyt: [
    { v:'정액',     s:0, e:0 },
    { v:'횟수',     s:1, e:1 },
    { v:'정액',     s:2, e:5 },
    { v:'정률(%)',  s:6, e:10 },
  ],
  pm1: [
    { v:'지역/ZONE 선택', s:0, e:0 },
    { v:'지역/ZONE 선택', s:1, e:1 },
    { v:'지역/ZONE 선택', s:2, e:2 },
    { v:'시간대 설정', s:3, e:3 },
    { v:'날짜 지정', s:4, e:4 },
    { v:'비활성 기간 조건', s:5, e:5 },
    { v:'직전 2주 배달\n누적 건수', s:6, e:10 },
  ],
  pm2: [
    { v:'특정 상점 선택', s:0, e:0 },
    { v:'특정 상점 선택', s:1, e:1 },
    { v:'특정 라이더 선택', s:2, e:2 },
    { v:'특정 건수 단계\n설정', s:3, e:3 },
    { v:'목표 건수', s:4, e:4 },
    { v:'복귀 후 목표 건수', s:5, e:5 },
    { v:'배차 수락률 기준', s:6, e:10 },
  ],
  pm3: [
    { v:'적용 기간', s:0, e:0 },
    { v:'횟수 설정\n(최대 5회)', s:1, e:1 },
    { v:'적용 기간', s:2, e:2 },
    { v:'등급 선택', s:3, e:3 },
    { v:'등급 선택', s:4, e:4 },
    { v:'등급 선택', s:5, e:5 },
    { v:'매주 배달\n최소 건수', s:6, e:10 },
  ],
};

const CLS = ['c0','c1','c2','c3','c4','c5','c5','c5','c6'];
const KEYS = ['cam','typ','rwt','tgt','ttp','mtd','pyt','pm1','pm2','pm3'];

function fgs(key, s) { return G[key] ? G[key].find(g => g.s === s) : null; }
function fgr(key, r) { return G[key] ? G[key].find(g => g.s <= r && r <= g.e) : null; }

KEYS.forEach((k) => {
  const col = C[k];
  const el = document.createElement('div');
  el.className = 'hdr';
  el.style.cssText = `left:${col.x}px; width:${col.w}px;`;
  el.textContent = col.lbl;
  D.appendChild(el);
});

KEYS.forEach((key, ki) => {
  const col = C[key];
  G[key].forEach(grp => {
    if (!grp.v) return;
    const cy = gc(grp.s, grp.e);
    const el = document.createElement('div');
    const condCol = key === 'pm1' || key === 'pm2' || key === 'pm3';
    el.className = 'nd ' + (condCol ? 'nd-cond ' : '') + (grp.cls || CLS[ki]);
    el.style.cssText = `left:${col.x}px; top:${cy-NH/2}px; width:${col.w}px; height:${NH}px;`;
    if (/\n/.test(grp.v)) el.style.whiteSpace = 'pre-line';
    el.textContent = grp.v;
    D.appendChild(el);
  });
});

function line(x1,y1,x2,y2) {
  const mx = x1 + (x2 - x1) * 0.5;
  const p = document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d',`M${x1},${y1} L${mx},${y1} L${mx},${y2} L${x2},${y2}`);
  p.setAttribute('fill','none');
  p.setAttribute('stroke','#5a85c0');
  p.setAttribute('stroke-width','1.15');
  p.setAttribute('stroke-linecap','round');
  p.setAttribute('stroke-linejoin','round');
  SVG.appendChild(p);
}

function connG(fkey, fs, tkey, ts) {
  const fg = fgs(fkey, fs);
  const tg = fgs(tkey, ts);
  if (!fg || !tg) return;
  const fc = C[fkey], tc = C[tkey];
  line(fc.x+fc.w, gc(fg.s,fg.e), tc.x, gc(tg.s,tg.e));
}

connG('cam',0,'typ',0); connG('cam',0,'typ',3); connG('cam',0,'typ',6);
connG('typ',0,'rwt',0); connG('typ',0,'rwt',1); connG('typ',0,'rwt',2);
connG('typ',3,'rwt',2);
connG('typ',6,'rwt',6);
connG('rwt',0,'tgt',0); connG('rwt',1,'tgt',0);
connG('rwt',2,'tgt',2);
connG('rwt',6,'tgt',2);
connG('tgt',0,'mtd',0); connG('tgt',0,'mtd',1);
connG('tgt',2,'ttp',2); connG('tgt',2,'ttp',6);
connG('ttp',2,'mtd',2); connG('ttp',2,'mtd',3); connG('ttp',2,'mtd',4); connG('ttp',2,'mtd',5);
connG('ttp',6,'mtd',6);

function connectTail(mtdStart) {
  const m = fgs('mtd', mtdStart);
  const py = fgr('pyt', mtdStart);
  const a = fgs('pm1', mtdStart);
  const b = fgs('pm2', mtdStart);
  const c = fgs('pm3', mtdStart);
  if (!m || !py || !a || !b || !c) return;
  line(C.mtd.x + C.mtd.w, gc(m.s, m.e), C.pyt.x, gc(py.s, py.e));
  line(C.pyt.x + C.pyt.w, gc(py.s, py.e), C.pm1.x, gc(a.s, a.e));
  line(C.pm1.x + C.pm1.w, gc(a.s, a.e), C.pm2.x, gc(b.s, b.e));
  line(C.pm2.x + C.pm2.w, gc(b.s, b.e), C.pm3.x, gc(c.s, c.e));
}
[0, 1, 2, 3, 4, 5, 6].forEach(connectTail);

const totalH = DT + 11*RP + 36;
const totalW = C.pm3.x + C.pm3.w + 24;
D.style.cssText = `width:${totalW}px; min-height:${totalH}px; height:${totalH}px;`;
SVG.setAttribute('width', totalW);
SVG.setAttribute('height', totalH);
document.body.style.minWidth = (totalW + 32) + 'px';
</script>
</body>
</html>
